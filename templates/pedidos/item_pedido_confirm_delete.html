{% extends 'base.html' %}

{% block title %}Excluir item | Eletronics Store{% endblock %}

{% block content %}
<section class="page-header">
    <div>
        <p class="eyebrow">Pedido #{{ object.pedido.id }}</p>
        <h1>Excluir item</h1>
    </div>
    <a class="button ghost" href="{% url 'pedido_detalhar' object.pedido.id %}">Voltar</a>
</section>

<form class="confirm-panel" method="post">
    {% csrf_token %}
    <h2>{{ object.produto.nome }}</h2>
    <p>Tem certeza que deseja excluir este item do pedido?</p>

    <div class="form-actions">
        <a class="button ghost" href="{% url 'pedido_detalhar' object.pedido.id %}">Cancelar</a>
        <button class="button danger" type="submit">Excluir</button>
    </div>
</form>
{% endblock %}
